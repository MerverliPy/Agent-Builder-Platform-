name: E2E Tests

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install server deps
        working-directory: server
        run: npm ci

      - name: Start server in background
        working-directory: server
        run: |
          # start server and write pid
          npm start &> /tmp/server.log &
          echo $! > /tmp/server.pid

      - name: Wait for server
        run: npx wait-on http://localhost:5000 --timeout 30000

      - name: Install Playwright browsers and system dependencies
        # Use the playwright CLI to install browsers and dependencies directly.
        # Capture output to a log so failures are diagnosable in CI.
        run: npx playwright install --with-deps 2>&1 | tee /tmp/playwright-install.log

      - name: Print Playwright version
        run: npx playwright --version || true

      - name: Install client deps
        working-directory: client
        run: npm ci

      - name: Build client
        working-directory: client
        run: npm run build

      - name: Serve client in background
        working-directory: client
        run: |
          # serve the static build on port 3000 using our minimal static server
          HOST=127.0.0.1 PORT=3000 node static-server.js &> /tmp/client.log &
          echo $! > /tmp/client.pid

      - name: Wait for client
        run: npx wait-on http://localhost:3000 --timeout 30000

      - name: Run Playwright tests
        working-directory: client
        env:
          CI: true
        run: npm run e2e

      - name: Stop server
        if: always()
        run: |
          if [ -f /tmp/server.pid ]; then kill $(cat /tmp/server.pid) || true; fi
          if [ -f /tmp/client.pid ]; then kill $(cat /tmp/client.pid) || true; fi

      - name: Upload E2E diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-diagnostics-${{ github.run_id }}
          path: |
            /tmp/server.log
            /tmp/client.log
            /tmp/playwright-install.log
            client/playwright-report
            client/playwright-report/**
            client/test-results
