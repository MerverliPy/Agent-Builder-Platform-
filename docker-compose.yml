version: '3.8'

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      - JWT_SECRET=${JWT_SECRET:-dev-secret}
      - HOST=0.0.0.0
      - PORT=5000
    volumes:
      - ./server/uploads:/app/uploads
    network_mode: host
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    environment:
      - PORT=3000
    network_mode: host
    restart: unless-stopped
